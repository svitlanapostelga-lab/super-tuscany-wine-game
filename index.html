<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Super Tuscany Wine Quiz</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    .question { margin-bottom: 15px; }
    button { margin-top: 10px; }
    .result { margin-top: 20px; font-weight: bold; }
  </style>
</head>
<body>
  <h1>Super Tuscany Wine Quiz</h1>
  <div id="quiz-container"></div>
  <button onclick="submitAnswer()">Submit Answer</button>
  <div class="result" id="result"></div>

  <script>
    const questions = [
      {
        question: "Which grape is commonly used in Super Tuscany wines?",
        options: ["Sangiovese", "Nebbiolo", "Merlot", "Cabernet Sauvignon"],
        answer: 3
      },
      {
        question: "Super Tuscany wines are primarily produced in which region?",
        options: ["Piedmont", "Tuscany", "Veneto", "Sicily"],
        answer: 1
      }
    ];

    let currentQuestion = 0;
    const quizContainer = document.getElementById('quiz-container');
    const resultDiv = document.getElementById('result');

    function loadQuestion() {
      const q = questions[currentQuestion];
      let html = `<div class='question'><p>${q.question}</p>`;
      q.options.forEach((opt, i) => {
        html += `<label><input type='radio' name='option' value='${i}'> ${opt}</label><br>`;
      });
      html += '</div>';
      quizContainer.innerHTML = html;
      resultDiv.innerHTML = '';
    }

    function submitAnswer() {
      const selected = document.querySelector('input[name="option"]:checked');
      if (!selected) {
        alert('Please select an answer.');
        return;
      }
      const answer = parseInt(selected.value);
      if (answer === questions[currentQuestion].answer) {
        resultDiv.textContent = 'Correct!';
      } else {
        resultDiv.textContent = 'Incorrect. Try again!';
      }
      currentQuestion++;
      if (currentQuestion < questions.length) {
        setTimeout(loadQuestion, 1500);
      } else {
        setTimeout(() => {
          quizContainer.innerHTML = '<p>Quiz complete! Thanks for playing.</p>';
          resultDiv.innerHTML = '';
        }, 1500);
      }
    }

    loadQuestion();
  </script>
</body>
</html>
